name: sos1
version: 1.0.0+1
publish_to: none
description: A voice-based emergency assistant app

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # State Management & Architecture
  stacked: ^3.4.0
  stacked_services: ^1.5.0
  
  # Speech Recognition & Text-to-Speech
  speech_to_text: ^7.0.0
  flutter_tts: ^3.8.5
  
  # AI / ML
  google_generative_ai: ^0.4.6
  langchain: ^0.7.0
  langchain_google: ^0.6.0
  
  # UI Components
  flutter_screenutil: ^5.9.0
  google_fonts: ^6.1.0
  
  # Utilities
  intl: ^0.19.0
  permission_handler: ^11.3.0
  url_launcher: ^6.2.5
  share_plus: ^7.2.1
  path_provider: ^2.1.2
  
  # Animation
  flutter_animate: ^4.5.0
  
  # Storage (Local Database)
  shared_preferences: ^2.2.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  
  # Location & GPS
  geolocator: ^10.1.0
  geocoding: ^2.1.1
  
  # Audio
  audioplayers: ^6.1.0
  
  # HTTP Client for AI APIs
  dio: ^5.4.0
  
  # Maps (optional for SOS History)
  # google_maps_flutter: ^2.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.8
  stacked_generator: ^1.6.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/bba_logo.png
    - assets/icons/
    - assets/sounds/
